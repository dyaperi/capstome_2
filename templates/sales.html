{% extends 'base.html' %}
{% block content %}
<h3>Sales Entry Form</h3>
<form method="post" class="card card-body mb-3">
  <input type="hidden" name="sale_id" value="{{ editing.id if editing else '' }}">
  <div class="row g-2">
    <div class="col-md-2"><label class="form-label">Date</label><input type="date" class="form-control" name="sale_date" value="{{ editing.sale_date if editing else today }}" required></div>
    <div class="col-md-2"><label class="form-label">Menu Item</label><select class="form-select" name="menu_item_id">{% for i in items %}<option value="{{ i.id }}" {% if editing and editing.menu_item_id==i.id %}selected{% endif %}>{{ i.item_name }}</option>{% endfor %}</select></div>
    <div class="col-md-1"><label class="form-label">Qty</label><input type="number" min="1" class="form-control" name="quantity" value="{{ editing.quantity if editing else '' }}" required></div>
    <div class="col-md-2"><label class="form-label">Unit Price</label><input step="0.01" class="form-control" name="unit_price" value="{{ editing.unit_price if editing else '' }}" required></div>
    <div class="col-md-2"><label class="form-label">Unit Cost</label><input step="0.01" class="form-control" name="unit_cost" value="{{ editing.unit_cost if editing else '' }}" required></div>
    <div class="col-md-2"><label class="form-label">Extra Expense</label><input step="0.01" class="form-control" name="extra_expense" value="{{ editing.extra_expense if editing else 0 }}"></div>
    <div class="col-md-1"><label class="form-label">Channel</label><select class="form-select" name="channel"><option>Walk-in</option><option>Delivery</option><option>Takeaway</option></select></div>
  </div>
  <button class="btn btn-primary mt-3">{{ 'Update' if editing else 'Save' }} Sales</button>
  {% if editing %}<a class="btn btn-secondary mt-3" href="{{ url_for('sales_entry') }}">Cancel</a>{% endif %}
</form>
<table class="table table-sm table-striped">
  <thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Price</th><th>Cost</th><th>Actions</th></tr></thead>
  <tbody>{% for s in recent %}<tr><td>{{ s.sale_date }}</td><td>{{ s.menu_item.item_name }}</td><td>{{ s.quantity }}</td><td>{{ s.unit_price }}</td><td>{{ s.unit_cost }}</td><td class="d-flex gap-1"><a class="btn btn-sm btn-warning" href="{{ url_for('sales_entry', edit=s.id) }}">Edit</a><form method="post" action="{{ url_for('sales_delete', sale_id=s.id) }}" onsubmit="return confirm('Delete this sales row?');"><button class="btn btn-sm btn-danger" type="submit">Delete</button></form></td></tr>{% endfor %}</tbody>
</table>
{% endblock %}
